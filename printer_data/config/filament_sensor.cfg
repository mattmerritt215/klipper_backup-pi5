[filament_switch_sensor toolhead_filament_sensor]
pause_on_runout: False
event_delay: 0.1
pause_delay: 0.1
switch_pin: ^toolboard_t0:PB3
runout_gcode:
	_ON_FILAMENT_SENSOR_RUNOUT
insert_gcode:
	_ON_FILAMENT_SENSOR_INSERT

[gcode_button toolhead_filament_sensor_button]
pin: ^!toolboard_t0:PB4
release_gcode:
	{% if (printer.print_stats.state == "printing") %}
		_ON_FILAMENT_SENSOR_CLOG
	{% else %}
		_ON_FILAMENT_SENSOR_BUTTON_PRESS
	{% endif %}
press_gcode:

[gcode_macro FILAMENT_SENSOR]
variable_enable_autoload: True
variable_enable_resume: True
variable_enable_runout: True
variable_enable_tangle: True
gcode:
    {% if params %}
      SET_GCODE_VARIABLE MACRO=FILAMENT_SENSOR VARIABLE=enable_autoload VALUE={True if params.AUTOLOAD|default(1)|int == 1 else False}
      SET_GCODE_VARIABLE MACRO=FILAMENT_SENSOR VARIABLE=enable_resume VALUE={True if params.RESUME|default(1)|int == 1 else False}
      SET_GCODE_VARIABLE MACRO=FILAMENT_SENSOR VARIABLE=enable_runout VALUE={True if params.RUNOUT|default(1)|int == 1 else False}
      SET_GCODE_VARIABLE MACRO=FILAMENT_SENSOR VARIABLE=enable_tangle VALUE={True if params.TANGLE|default(1)|int == 1 else False}
    {% endif %}

    {% set sensor = printer["gcode_macro FILAMENT_SENSOR"] %}
    { action_respond_info("FILAMENT SENSOR toolhead_filament_sensor:") }
    { action_respond_info("\tRunout detection: %s" | format(sensor.enable_runout)) }
    { action_respond_info("\tAutoload on insert: %s" | format(sensor.enable_autoload)) }
    { action_respond_info("\tResume on insert: %s" | format(sensor.enable_resume)) }
    { action_respond_info("\tTangle detection: %s" | format(sensor.enable_tangle)) }

[gcode_macro _ON_FILAMENT_SENSOR_RUNOUT]
gcode:
	{% set runout_detection = true if printer["gcode_macro FILAMENT_SENSOR"].enable_runout|default(true)|lower == 'true' else false %}

	{% if runout_detection %}
		{% if printer.idle_timeout.state | string == "Printing" or 
			(printer.virtual_sdcard|default({})).is_active|default(False) %} 
			{ action_respond_info("RUNOUT DETECTED!") }
			{% if not printer.pause_resume.is_paused %}
				PAUSE
			{% endif %}
			UNLOAD_FILAMENT
		{% endif %}
	{% else %}
		{ action_respond_info("Runout detection is disabled in the sensor config!") }
	{% endif %}

[gcode_macro _ON_FILAMENT_SENSOR_INSERT]
gcode:
	{% set insert_detection = true if printer["gcode_macro FILAMENT_SENSOR"].enable_autoload|default(true)|lower == 'true' else false %}
	{% set resume_on_load = true if printer["gcode_macro FILAMENT_SENSOR"].enable_resume|default(true)|lower == 'true' else false %}

	{% if insert_detection %}
		{ action_respond_info("INSERT DETECTED!") }
		LOAD_FILAMENT
		{% if printer.pause_resume.is_paused and resume_on_load %}
			RESUME
		{% endif %}
	{% else %}
		{ action_respond_info("Insert detection is disabled in the sensor config!") }
	{% endif %}

[gcode_macro _ON_FILAMENT_SENSOR_CLOG]
gcode:
	{% set clog_detection = true if printer["gcode_macro FILAMENT_SENSOR"].enable_tangle|default(true)|lower == 'true' else false %}

	{% if clog_detection %}
		{ action_respond_info("CLOG/TANGLE DETECTED! CHECK FILAMENT PATH!") }
		PAUSE B=15
	{% else %}
		{ action_respond_info("Clog/tangle detection is disabled in the sensor config!") }
	{% endif %}

[gcode_macro _ON_FILAMENT_SENSOR_BUTTON_PRESS]
gcode:
	UNLOAD_FILAMENT

[gcode_macro ENABLE_FILAMENT_SENSOR]
gcode:
    { action_respond_info("toolhead_filament_sensor enabled because printer has entered STATUS=printing") }
	SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=1

[gcode_macro DISABLE_FILAMENT_SENSOR]
gcode:
  { action_respond_info("toolhead_filament_sensor disabled because printer has left STATUS=printing") }
  SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=0

[delayed_gcode DISABLE_FILAMENT_SENSOR_ON_STARTUP]
initial_duration: 1.
gcode:
  { action_respond_info("toolhead_filament_sensor disabled until printer enters STATUS=printing!") }
  SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=0