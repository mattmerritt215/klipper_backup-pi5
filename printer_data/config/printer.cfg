[include mainsail.cfg]
[include cartographer.cfg]
[include km_options.cfg]
[include steppers.cfg]
[include homing.cfg]
[include filament_sensor.cfg]
[include user.cfg]
#[include fan_check.cfg]
[include autotune_tmc.cfg]
[include timelapse.cfg]

#####################################################################################################################
###			MCU
#####################################################################################################################
[board_pins btt-skrat]
aliases:
    # X Stepper
    x_step_pin=PF9, x_dir_pin=PD7, x_enable_pin=PD6, x_uart_pin=PF10, x_diag_pin=PB5,
    # Y Stepper
    y_step_pin=PD3, y_dir_pin=PD2, y_enable_pin=PD5, y_uart_pin=PD4, y_diag_pin=PC1,
    # Z Stepper
    z0_step_pin=PA15, z0_dir_pin=PF8, z0_enable_pin=PC9, z0_uart_pin=PC8, z0_diag_pin=PC0,
    # Accelerometer
    adxl345_cs_pin=PB12, adxl345_sclk_pin=PB13, adxl345_mosi_pin=PB15, adxl345_miso_pin=PB14,
    # Thermistors
    thermistor0_pin=PA3, thermistor1_pin=PA2, thermistor2_pin=PA1, thermistor3_pin=PA0,
    # Bed heater
    heater_bed_heater_pin=PB3, heater_bed_sensor_pin=PB2,
    # 2-pin fans
    fan0_pin=PD15, fan1_pin=PD14, fan2_pin=PD13, fan3_pin=PD12,
    # 4-pin fans
    4pin_fan0_pwm_pin=PE9, 4p_fan0_tach_pin=PD11, 4pin_fan1_pwm_pin=PE14, 4p_fan1_tach_pin=PD10,
    # Filament sensors
    e0_det_pin=PF4, e1_det_pin=PF5,
    # Neopixel
    neopixel_pin=PE4
    
[board_pins btt-ebb36]
mcu: toolboard_t0
aliases:
    # Extrusion
    e_step_pin=PD0, e_dir_pin=PD1, e_enable_pin=PD2, e_uart_pin=PA15, e_heater_pin=PB13, e_sensor_pin=PA3,
    # Accelerometer
    adxl345_cs_pin=PB12, adxl345_miso_pin=PB2, adxl345_mosi_pin=PB11, adxl345_clk_pin=PB10,
    # Thermocouple
    max31865_cs_pin=PA4, max31865_miso_pin=PA6, max31865_mosi_pin=PA7, max31865_clk_pin=PA5,
    # Probe
    probe_pin=PB9,
    # Cooling
    fan_part_cooling_pin=PA0,
    fan_toolhead_cooling_pin=PA1, fan_toolhead_tach_pin=PB8
    
[mcu]
canbus_uuid: 17bf69ae66ee

[mcu toolboard_t0]
canbus_uuid: 43290ab57143

#[mcu btt_adxl345]
#serial: /dev/serial/by-id/usb-Klipper_rp2040_5044506130B66D1C-if00

[mcu host]
serial: /tmp/klipper_host_mcu


#####################################################################################################################
###			RESONANCE TESTER
#####################################################################################################################

[adxl345 skrat]
cs_pin: adxl345_cs_pin
spi_bus: spi2

[adxl345 toolhead]
cs_pin: toolboard_t0:adxl345_cs_pin
spi_software_mosi_pin: toolboard_t0:adxl345_mosi_pin
spi_software_miso_pin: toolboard_t0:adxl345_miso_pin
spi_software_sclk_pin: toolboard_t0:adxl345_clk_pin
axes_map: x, z, y

#[adxl345 bed]
#cs_pin: btt_adxl345:gpio9
#spi_bus: spi1_gpio8_gpio11_gpio10

#[resonance_tester]
#accel_chip_x: adxl345 cartographer
#accel_chip_y: adxl345 bed
#probe_points: 90,90,20

#####################################################################################################################
###			INPUT SHAPER
#####################################################################################################################

[input_shaper]
#shaper_freq_x: 100
#shaper_freq_y: 70.2
#shaper_type_x: ei
#shaper_type_y: 2hump_ei
    
#####################################################################################################################
###			KINEMATICS
#####################################################################################################################

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 3000
minimum_cruise_ratio: 0.5
max_z_velocity: 10
max_z_accel: 50
square_corner_velocity: 5

[skew_correction]

[axis_twist_compensation]
calibrate_start_x: 20.0
calibrate_end_x: 160.0
calibrate_y: 67.7
calibrate_start_y: 33.3
calibrate_end_y: 146.7
calibrate_x: 90.0

[force_move]
enable_force_move: True

#####################################################################################################################
###			EXTRUDER
#####################################################################################################################

[extruder]
max_extrude_only_distance: 200
max_extrude_only_velocity: 60
max_extrude_cross_section: 25
filament_diameter: 1.75
nozzle_diameter: 0.4
heater_pin: toolboard_t0:e_heater_pin
sensor_type: PT1000
sensor_pin: toolboard_t0:e_sensor_pin
pullup_resistor: 2200
#spi_bus: spi1
#rtd_nominal_r: 100
#rtd_reference_r: 430
#rtd_num_of_wires: 2
#control: watermark
min_extrude_temp: 170
min_temp: 0
max_temp: 350
pressure_advance: 0.03

#####################################################################################################################
###			BED (HEATING, PROBING, MESHING, TILT ADJUST)
#####################################################################################################################

[heater_bed]
heater_pin: heater_bed_heater_pin
sensor_pin: heater_bed_sensor_pin
sensor_type: EPCOS 100K B57560G104F
min_temp: 0
max_temp: 130
#control: watermark

[screws_tilt_adjust]
screw1: 57,84
screw1_name: Left Screw
screw2: 130,49
screw2_name: Front_Right_Screw
screw3: 130,124
screw3_name: Rear_Right_Screw
horizontal_move_z: 5
speed: 200
screw_thread: CW-M4

#####################################################################################################################
###			FANS AND TEMPERATURE SENSORS
#####################################################################################################################

[temperature_sensor Pi5]
sensor_type: temperature_host

[temperature_sensor SKRat]
sensor_type: temperature_mcu

[temperature_sensor EBB36]
sensor_type: temperature_mcu
sensor_mcu: toolboard_t0

[fan]
pin: toolboard_t0:fan_part_cooling_pin

[controller_fan controller_fan]
pin: fan3_pin

[heater_fan toolhead_cooling_fan]
heater: extruder
heater_temp: 100
pin: fan0_pin
tachometer_pin: ^e0_det_pin


#####################################################################################################################
###			LEDs
#####################################################################################################################
[neopixel z-axis]
pin: neopixel_pin
chain_count: 36
color_order: GRB
initial_red: 0.15
initial_green: 0.15
initial_blue: 0.15

[output_pin chamber_light]
pin: PE11
pwm: False
value: 0

