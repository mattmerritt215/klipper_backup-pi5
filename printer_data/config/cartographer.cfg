[mcu cartographer]
canbus_uuid: da9bbdb0a028

[cartographer]
mcu: cartographer
x_offset: 0
y_offset: 23.3
verbose: yes

[cartographer scan]
probe_speed: 5
mesh_runs: 1
mesh_height: 2
mesh_path: snake

[cartographer touch]
samples: 3
max_samples: 10
max_noisy_samples: 3
retract_distance: 3
sample_range: 0.01

[bed_mesh]
zero_reference_position: 90, 90
speed: 300
horizontal_move_z: 1
mesh_min: 20,33.3
mesh_max: 160,170
probe_count: 45,45
adaptive_margin: 5
algorithm: bicubic
bicubic_tension: 0.2
mesh_pps: 2,2

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 0
max_temp: 110

[adxl345 cartographer]
cs_pin: cartographer:PA0
spi_bus: spi1

