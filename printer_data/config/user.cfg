[gcode_macro LIGHT_ON]
gcode:
  {% set Brightness = params.Brightness|default(1.0)|float %}
  SET_PIN PIN=chamber_light Value={Brightness}
 
[gcode_macro LIGHT_OFF]
 gcode:
   SET_PIN PIN=chamber_light Value=0

[gcode_macro STC]
gcode:
	SCREWS_TILT_CALCULATE

[gcode_macro PREHEAT_HOLD]
gcode:
  {% set BED = params.BED|default(120)|int %}
  {% set EXTRUDER = params.EXTRUDER|default(145)|int %}
  {% set TIMEOUT = params.TIMEOUT|default(7200)|int %}
  
  SET_HEATER_TEMPERATURE  HEATER=heater_bed TARGET={BED}
  SET_HEATER_TEMPERATURE  HEATER=extruder TARGET={EXTRUDER}
  M106 S204
  G28
  M83
  G0 X9 Y90 Z1 F300
  SET_IDLE_TIMEOUT TIMEOUT={TIMEOUT}

[gcode_macro PID_CALIBRATE_BED]
gcode:
    {% set target = params.TAGRET|default(80.0)|float %}
    {% set save = params.SAVE|default(0)|int %}
    {% if save not in [0,1] %}
      { action_raise_error("Invalid value provided for parameter 'SAVE'. Config will NOT be saved!") }
    {% endif %}
    
    _KM_PRINT_STATUS ACTION=PUSH_STATUS
    _KM_PRINT_STATUS ACTION=CHANGE STATUS=bed_heating
    PID_CALIBRATE HEATER=heater_bed TARGET={target}
    _KM_PRINT_STATUS ACTION=CHANGE STATUS=pop_status

    {% if save == 1 %}
      SAVE_CONFIG
    {% endif %}

[gcode_macro PID_CALIBRATE_HOTEND]
gcode:
    {% set target = params.TARGET|default(220.0)|float %}
    {% set save = params.SAVE|default(0)|int %}
    {% if save not in [0,1] %}
	{ action_raise_error("Invalid value provided for parameter 'SAVE'. Config will NOT be saved!") }
    {% endif %}
    
    _KM_PRINT_STATUS ACTION=PUSH_STATUS
    _KM_PRINT_STATUS ACTION=CHANGE STATUS=extruder_heating
    PID_CALIBRATE HEATER=extruder TARGET={target}
    _KM_PRINT_STATUS ACTION=CHANGE STATUS=pop_status

    {% if save == 1 %}
      SAVE_CONFIG
    {% endif %}
   
[gcode_macro SKEW_PROFILE]
rename_existing: BUILTIN_SKEW_PROFILE
gcode:
  BUILTIN_SKEW_PROFILE {rawparams}
  {% if 'LOAD' in params %}
    GET_CURRENT_SKEW
  {% endif %}

[gcode_macro _PAUSING_SKEW_PROFILE]
gcode:
    SKEW_PROFILE SAVE=pausing_skew_profile
    SET_SKEW CLEAR=1
    GET_CURRENT_SKEW

[gcode_macro _RESUMING_SKEW_PROFILE]
gcode:
    SKEW_PROFILE LOAD=pausing_skew_profile

[gcode_macro CARTOGRAPHER_TOUCH_HOME]
rename_existing: WRAPPED_CARTOGRAPHER_TOUCH_HOME
gcode:
  _KM_PRINT_STATUS ACTION=PUSH_STATUS
  _KM_PRINT_STATUS ACTION=CHANGE STATUS=calibrating_z
  WRAPPED_CARTOGRAPHER_TOUCH_HOME {rawparams}
  _KM_PRINT_STATUS ACTION=CHANGE STATUS=pop_status
