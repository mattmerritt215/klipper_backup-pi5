[stepper_x]
step_pin: x_step_pin
dir_pin: x_dir_pin
enable_pin: !x_enable_pin
rotation_distance: 40
microsteps: 128
full_steps_per_rotation: 200
position_max: 180
position_min: -1
position_endstop: -1
homing_speed: 80

[stepper_y]
step_pin: y_step_pin
dir_pin: !y_dir_pin
enable_pin: !y_enable_pin
rotation_distance: 40
microsteps: 128
full_steps_per_rotation: 200
position_max: 180
position_min: 0
position_endstop: 0
homing_speed: 80

[stepper_z]
step_pin: z0_step_pin
dir_pin: z0_dir_pin
enable_pin: !z0_enable_pin
rotation_distance: 2
microsteps: 16
full_steps_per_rotation: 200
position_max: 180
position_min: -10
endstop_pin: probe:z_virtual_endstop
homing_speed: 20
homing_retract_dist: 0

[extruder]
step_pin: toolboard_t0:e_step_pin
dir_pin: toolboard_t0:e_dir_pin
enable_pin: !toolboard_t0:e_enable_pin
microsteps: 64
rotation_distance: 4.7689
full_steps_per_rotation: 200

[tmc2209 stepper_x]
stealthchop_threshold: 0
interpolate: False
uart_pin: x_uart_pin
run_current: 0.976
driver_TBL: 1
driver_TOFF: 3
driver_HEND: 3
driver_HSTRT: 1
sense_resistor: 0.11

[tmc2209 stepper_y]
stealthchop_threshold: 0
interpolate: False
uart_pin: y_uart_pin
run_current: 0.976
driver_TBL: 1
driver_TOFF: 3
driver_HEND: 3
driver_HSTRT: 1
sense_resistor: 0.11

[tmc2209 stepper_z]
stealthchop_threshold: 999
interpolate: False
uart_pin: z0_uart_pin
run_current: 1.188

[tmc2209 extruder]
stealthchop_threshold: 0
interpolate: False
uart_pin: toolboard_t0:e_uart_pin
run_current: 0.707
driver_TBL: 1
driver_TOFF: 3
driver_HEND: 9
driver_HSTRT: 7
sense_resistor: 0.11

