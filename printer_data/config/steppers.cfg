[stepper_x]
step_pin: x_step_pin
dir_pin: x_dir_pin
enable_pin: !x_enable_pin
rotation_distance: 40
microsteps: 128
full_steps_per_rotation: 200
position_max: 180
position_min: -1
position_endstop: -1
homing_speed: 80

[stepper_y]
step_pin: y_step_pin
dir_pin: !y_dir_pin
enable_pin: !y_enable_pin
rotation_distance: 40
microsteps: 128
full_steps_per_rotation: 200
position_max: 180
position_min: 0
position_endstop: 0
homing_speed: 80

[stepper_z]
step_pin: z0_step_pin
dir_pin: z0_dir_pin
enable_pin: !z0_enable_pin
rotation_distance: 3
microsteps: 16
full_steps_per_rotation: 200
position_max: 180
position_min: -10
endstop_pin: probe:z_virtual_endstop
homing_speed: 20
homing_retract_dist: 0

[extruder]
step_pin: toolboard_t0:e_step_pin
dir_pin: toolboard_t0:e_dir_pin
enable_pin: !toolboard_t0:e_enable_pin
microsteps: 64
rotation_distance: 4.666369
full_steps_per_rotation: 200

[tmc2209 stepper_x]
interpolate: False
uart_pin: x_uart_pin
run_current: 0.976
sense_resistor: 0.11

[tmc2209 stepper_y]
interpolate: False
uart_pin: y_uart_pin
run_current: 0.976
sense_resistor: 0.11

[tmc2209 stepper_z]
interpolate: False
uart_pin: z0_uart_pin
run_current: 1.188

[tmc2209 extruder]
interpolate: False
uart_pin: toolboard_t0:e_uart_pin
run_current: 0.707
sense_resistor: 0.11

