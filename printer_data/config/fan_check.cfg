[delayed_gcode CHECK_FANS]
initial_duration: 1
gcode:
    TOOLHEAD_FAN_CHECK
    UPDATE_DELAYED_GCODE ID=CHECK_FANS DURATION=3

[gcode_macro TOOLHEAD_FAN_CHECK]
variable_fan_stopped_counter: 0
gcode:
    {% set rpm_min = 2000|float %}
    {% set rpm_actual = printer["heater_fan toolhead_cooling_fan"].rpm|float %}
    {% set target = printer[printer.toolhead.extruder].target|float %}
    {% set actual = printer[printer.toolhead.extruder].temperature|float %}
    {% set fan_temp = printer.configfile.settings["heater_fan toolhead_cooling_fan"].heater_temp|float %}
    {% set stopped_count = printer["gcode_macro TOOLHEAD_FAN_CHECK"].fan_stopped_counter|int %}
    {% set stopped_count_max = 3 %}

    {% if ((target >= fan_temp) or (actual >= fan_temp)) and (rpm_actual < rpm_min) %}
        SET_GCODE_VARIABLE MACRO=TOOLHEAD_FAN_CHECK VARIABLE=fan_stopped_counter VALUE={stopped_count + 1}
        RESPOND PREFIX="WARNING" MSG="Toolhead T0 cooling fan RPM is below {rpm_min} while the extruder is hot! (Actual: {rpm_actual} RPM)"
        M400
        {% if printer["gcode_macro TOOLHEAD_FAN_CHECK"].fan_stopped_counter|int > stopped_count_max %}
            FAN_STOPPAGE_ROUTINE
        {% endif %}
    {% else %}
        SET_GCODE_VARIABLE MACRO=TOOLHEAD_FAN_CHECK VARIABLE=fan_stopped_counter VALUE=0
    {% endif %}
   
[gcode_macro FAN_STOPPAGE_ROUTINE]
gcode:
    {% if printer['pause_resume'].is_paused|int == 0 %}
        RESPOND PREFIX="WARNING" MSG="Pausing print due to fan stoppage!"
        PAUSE
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
    {% endif %}
